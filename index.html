<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>MD 阅读器 — 在线打开 Markdown 文件，免上传</title>
  <meta name="description" content="在浏览器里直接打开、预览 .md / Markdown 文件。支持本地文件、链接导入，免登录、免上传、不联网也能用。可添加到桌面当 App 用。" />
  <link rel="canonical" href="https://mdreader.xyz/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="MD 阅读器 — 在线打开 Markdown 文件" />
  <meta property="og:description" content="拖入 .md 文件即可阅读，全程在本地，免上传。可添加到桌面当 App 用。" />
  <meta property="og:url" content="https://mdreader.xyz/" />
  <meta name="theme-color" content="#ffffff" />

  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/assets/styles.css" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "MD 阅读器",
    "url": "https://mdreader.xyz/",
    "description": "在浏览器里打开、预览 Markdown 文件，免上传，可添加到桌面。",
    "applicationCategory": "Utility",
    "operatingSystem": "HarmonyOS, Android, iOS, Windows, macOS, Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "CNY" }
  }
  </script>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <a href="/" class="logo">MD<span>·</span>阅读器</a>
      <nav>
        <button id="installBtn" class="btn ghost" hidden>＋ 添加到桌面</button>
        <a href="/about">介绍</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <h1>Markdown 阅读器</h1>
      <p class="sub">拖入 .md 文件就能看，自动排版成网页。全程在本地，不上传、不登录。</p>

      <!-- 文件拖放区 -->
      <div class="dropzone" id="dropzone">
        <div class="big">点击选择，或把 .md 文件拖到这里</div>
        <div class="small">支持 .md / .markdown / .txt · 文件不会离开你的设备</div>
        <input type="file" id="fileInput" accept=".md,.markdown,.txt,text/markdown,text/plain" />
      </div>

      <!-- 链接导入 -->
      <div class="url-bar">
        <input type="url" id="urlInput" placeholder="或粘贴链接导入，如 https://raw.githubusercontent.com/..." />
        <button id="urlLoad" class="btn primary">打开</button>
      </div>

      <div class="hero-links">
        <a href="?demo">看个示例 →</a>
        <span class="dot">·</span>
        <a href="/about#desktop">怎么添加到桌面？</a>
      </div>

      <div id="status"></div>
    </section>

    <!-- 阅读区 -->
    <section class="viewer" id="viewer" style="display:none">
      <div class="toolbar" id="toolbar">
        <span class="tbar-title" id="tbTitle">—</span>
        <div class="tbar-actions">
          <button class="btn small" id="btnRaw">查看源码</button>
          <button class="btn small" id="btnCopy">复制</button>
          <button class="btn small" id="btnPrint">导出 PDF</button>
          <button class="btn small" id="btnDownload">存为网页</button>
        </div>
      </div>
      <article class="md-body" id="mdBody"></article>
      <pre class="md-raw" id="mdRaw" style="display:none"></pre>
    </section>
  </main>

  <footer class="site">
    <div class="wrap">
      <p>MD 阅读器 · 免费 · 不上传 · 可添加到桌面 — <a href="/about">详细介绍</a> · <a href="/privacy">隐私说明</a></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/assets/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
